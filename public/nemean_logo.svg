<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="100%" height="100%">
  <defs>
    <linearGradient id="nemeanGoldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDF0BE" />
      <stop offset="30%" stop-color="#E5C158" />
      <stop offset="70%" stop-color="#B88E28" />
      <stop offset="100%" stop-color="#F3D573" />
    </linearGradient>
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Dark Background Canvas -->
  <rect width="600" height="600" rx="40" fill="#0A090D" />

  <!-- Geometric Lion Head Group (facing right side-profile) -->
  <g transform="translate(10, -10)" stroke="url(#nemeanGoldGrad)" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- Top Crown / Mane Shield Cap -->
    <path d="M 240 130 L 350 130 L 415 220 L 310 220 Z" fill="url(#nemeanGoldGrad)" fill-opacity="0.15" stroke-width="10" />

    <!-- Back Outer Mane Strands -->
    <path d="M 155 270 L 210 190 L 285 170" />
    <path d="M 155 360 L 205 270 L 275 210 L 350 190" />
    <path d="M 155 450 L 205 365 L 265 300 L 340 250 L 415 230" />
    <path d="M 210 450 L 255 365 L 320 305 L 395 280" />
    
    <!-- Neck & Throat Lines -->
    <path d="M 265 525 L 310 455 L 365 410" />
    <path d="M 310 600 L 355 525 L 400 485 L 420 595" />

    <!-- Ear Detail -->
    <polygon points="225,205 285,250 240,290" fill="url(#nemeanGoldGrad)" stroke-width="8" />

    <!-- Brow, Forehead, Nose Bridge -->
    <path d="M 310 220 L 415 220 L 515 315 L 535 345 L 485 415" stroke-width="13" />
    <polygon points="515,315 535,345 485,415 450,395" fill="url(#nemeanGoldGrad)" stroke="none" />

    <!-- Eye (Sharp Geometric Gold Diamond/Triangle) -->
    <polygon points="410,290 460,310 420,325" fill="url(#nemeanGoldGrad)" stroke="none" />

    <!-- Muzzle, Snout & Open Roaring Mouth -->
    <path d="M 485 415 L 385 395 L 430 460 L 505 410" stroke-width="11" />
    <path d="M 430 460 L 490 520 L 430 490 L 395 555" stroke-width="11" />
    
    <!-- Teeth in Open Mouth -->
    <path d="M 445 475 L 458 495" stroke-width="10" />

    <!-- Chin, Jaw & Neck Base -->
    <path d="M 490 520 L 435 585 L 335 510" stroke-width="12" />
  </g>

  <!-- NEMEAN (Serence Gold Serif) -->
  <text 
    x="300" 
    y="490" 
    text-anchor="middle" 
    fill="url(#nemeanGoldGrad)" 
    font-size="62" 
    font-weight="900" 
    font-family="Times New Roman, Georgia, serif" 
    letter-spacing="12"
  >
    NEMEAN
  </text>

  <!-- INNOVATIONS / PARTNERS (Gold Sans Serif Spaced) -->
  <text 
    x="300" 
    y="540" 
    text-anchor="middle" 
    fill="url(#nemeanGoldGrad)" 
    font-size="28" 
    font-weight="700" 
    font-family="Arial, Helvetica, sans-serif" 
    letter-spacing="14"
  >
    INNOVATIONS
  </text>
</svg>
